<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pengumuman SNBT 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blob"></div>
    
    <div class="login-card">
        <div class="header">
            <h1>PENGUMUMAN SNBT</h1>
            <p class="subtitle">Seleksi Nasional Berdasarkan Tes Tahun 2026</p>
        </div>

        <form action="hasil.html">
            <div class="input-group">
                <label>Nomor Peserta</label>
                <input type="text" placeholder="Contoh: 1234567890" required maxlength="10">
            </div>

            <div class="input-group">
                <label>Tanggal Lahir</label>
                <input type="date" required>
            </div>

            <button type="submit" class="btn-primary">
                LIHAT HASIL SELEKSI
            </button>
        </form>

        <div class="footer">
            <p>&copy; 2026 Balai Pengelolaan Pengujian Pendidikan</p>
            <p>Kemendikbudristek RI</p>
        </div>
    </div>
</body>
</html>
